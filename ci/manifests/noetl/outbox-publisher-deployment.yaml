apiVersion: apps/v1
kind: Deployment
metadata:
  name: noetl-outbox-publisher
  namespace: noetl
  labels:
    app: noetl-outbox-publisher
    component: outbox-publisher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noetl-outbox-publisher
  template:
    metadata:
      labels:
        app: noetl-outbox-publisher
        component: outbox-publisher
    spec:
      serviceAccountName: noetl-worker
      initContainers:
        - name: wait-for-api
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "until curl -sf http://noetl.noetl.svc.cluster.local:8082/api/health; do echo 'Waiting for NoETL API...'; sleep 3; done"
      containers:
        - name: outbox-publisher
          image: image_name:image_tag
          imagePullPolicy: Never
          command:
            - python
          args:
            - -m
            - noetl.outbox
          envFrom:
            - configMapRef:
                name: noetl-outbox-publisher-config
            - secretRef:
                name: noetl-secret
          env:
            - name: NOETL_NODE_ID
              value: "1"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
