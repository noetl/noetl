apiVersion: apps/v1
kind: Deployment
metadata:
  name: paginated-api
  namespace: test-server
  labels:
    app: paginated-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paginated-api
  template:
    metadata:
      labels:
        app: paginated-api
    spec:
      containers:
      - name: api
        image: localhost/local/test-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5555
          name: http
        env:
        - name: PFT_RATE_LIMIT
          value: "500"
        livenessProbe:
          httpGet:
            path: /health
            port: 5555
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5555
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: paginated-api
  namespace: test-server
  labels:
    app: paginated-api
spec:
  type: ClusterIP
  selector:
    app: paginated-api
  ports:
  - port: 5555
    targetPort: 5555
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: paginated-api-ext
  namespace: test-server
  labels:
    app: paginated-api
spec:
  type: NodePort
  selector:
    app: paginated-api
  ports:
  - port: 5555
    targetPort: 5555
    nodePort: 30555
    protocol: TCP
    name: http
