# NoETL NATS supercluster — cluster B — Phase 4 round 3
#
# Generated by the same snippet documented at the top of
# cluster-a.yaml, with `build_cluster_manifests(b, supercluster=topo)`
# in place of `a`. See that file's header for the full topology
# definition and regeneration recipe.
#
# Sample manifest — committed verbatim. The
# `test_sample_cluster_b_yaml_matches_generator_output` drift guard
# catches any hand-edit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-cluster-b-config
  namespace: nats-supercluster
  labels:
    app: nats-cluster-b
    component: nats
    cluster-id: b
    managed-by: noetl
    region: us-west-2
data:
  nats.conf: "port: 4222\nhttp_port: 8222\n\njetstream {\n  store_dir: /data/jetstream\n\
    \  domain: \"tenant_default_org_default_region_us_west_2_cluster_b\"\n  max_memory_store:\
    \ 1GB\n  max_file_store: 5GB\n}\n\ncluster {\n  name: \"b\"\n  port: 6222\n  routes:\
    \ [\n    nats-route://nats-cluster-b-0.nats-cluster-b.nats-supercluster.svc.cluster.local:6222\n\
    \    nats-route://nats-cluster-b-1.nats-cluster-b.nats-supercluster.svc.cluster.local:6222\n\
    \    nats-route://nats-cluster-b-2.nats-cluster-b.nats-supercluster.svc.cluster.local:6222\n\
    \  ]\n}\n\ngateway {\n  name: \"b\"\n  port: 7222\n  gateways: [\n    { name:\
    \ \"a\", urls: [\"nats://nats-cluster-a.nats-supercluster.svc.cluster.local:7222\"\
    ] }\n  ]\n}\n\naccounts {\n  $SYS {\n    users: [\n      { user: sys, password:\
    \ sys }\n    ]\n  }\n  NOETL {\n    jetstream: enabled\n    users: [\n      {\
    \ user: noetl, password: noetl }\n    ]\n  }\n}\n"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats-cluster-b
  namespace: nats-supercluster
  labels: &id001
    app: nats-cluster-b
    component: nats
    cluster-id: b
    managed-by: noetl
    region: us-west-2
spec:
  serviceName: nats-cluster-b
  replicas: 3
  selector:
    matchLabels: *id001
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - name: nats
        image: nats:latest
        ports:
        - containerPort: 4222
          name: client
          protocol: TCP
        - containerPort: 8222
          name: monitoring
          protocol: TCP
        - containerPort: 6222
          name: cluster
          protocol: TCP
        - containerPort: 7222
          name: gateway
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        args:
        - -c
        - /etc/nats/nats.conf
        - --name
        - $(POD_NAME)
        volumeMounts:
        - name: nats-config
          mountPath: /etc/nats
        - name: nats-storage
          mountPath: /data
        startupProbe:
          httpGet:
            path: /healthz?js-server-only=true
            port: 8222
          periodSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /healthz?js-server-only=true
            port: 8222
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz?js-enabled-only=true
            port: 8222
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 1000m
      volumes:
      - name: nats-config
        configMap:
          name: nats-cluster-b-config
  volumeClaimTemplates:
  - metadata:
      name: nats-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats-cluster-b
  namespace: nats-supercluster
  labels: &id001
    app: nats-cluster-b
    component: nats
    cluster-id: b
    managed-by: noetl
    region: us-west-2
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: *id001
  ports:
  - name: client
    port: 4222
    targetPort: 4222
    protocol: TCP
  - name: monitoring
    port: 8222
    targetPort: 8222
    protocol: TCP
  - name: cluster
    port: 6222
    targetPort: 6222
    protocol: TCP
  - name: gateway
    port: 7222
    targetPort: 7222
    protocol: TCP
