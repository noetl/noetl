spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: *id001
  ports:
  - name: client
    port: 4222
    targetPort: 4222
    protocol: TCP
  - name: monitoring
    port: 8222
    targetPort: 8222
    protocol: TCP
  - name: cluster
    port: 6222
    targetPort: 6222
    protocol: TCP
  - name: gateway
    port: 7222
    targetPort: 7222
    protocol: TCP
