apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats-cluster-a
  namespace: nats-supercluster
  labels: &id001
    app: nats-cluster-a
    component: nats
    cluster-id: a
    managed-by: noetl
    region: us-east-1
spec:
  serviceName: nats-cluster-a
  replicas: 3
  selector:
    matchLabels: *id001
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - name: nats
        image: nats:latest
        ports:
        - containerPort: 4222
          name: client
          protocol: TCP
        - containerPort: 8222
          name: monitoring
          protocol: TCP
        - containerPort: 6222
          name: cluster
          protocol: TCP
        - containerPort: 7222
          name: gateway
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        args:
        - -c
        - /etc/nats/nats.conf
        - --name
        - $(POD_NAME)
        volumeMounts:
        - name: nats-config
          mountPath: /etc/nats
        - name: nats-storage
          mountPath: /data
        startupProbe:
          httpGet:
            path: /healthz?js-server-only=true
            port: 8222
          periodSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /healthz?js-server-only=true
            port: 8222
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz?js-enabled-only=true
            port: 8222
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 1000m
      volumes:
      - name: nats-config
        configMap:
          name: nats-cluster-a-config
  volumeClaimTemplates:
  - metadata:
      name: nats-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
---
