apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: noetl-worker-rust-scaler-worker-rust-pool
  namespace: noetl
  labels:
    app: noetl-worker-rust
    worker-pool: worker-rust-pool
    managed-by: noetl
spec:
  scaleTargetRef:
    name: noetl-worker-rust
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 30
  triggers:
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: nats.nats.svc.cluster.local:8222
      account: NOETL
      stream: NOETL_COMMANDS
      consumer: noetl_worker_pool_shared
      lagThreshold: '10'
      activationLagThreshold: '1'
      useHttps: 'false'
