apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: simple_http_example
  path: examples/simple_http
  labels:
    category: example
    version: v10

workload:
  api_url: "https://httpbin.org"
  endpoints:
    - path: "/get"
      name: "test_get"

workflow:
  - step: start
    desc: "Start workflow"
    tool:
      kind: http
      spec:
        method: GET
        url: "{{ api_url }}/get"
        params:
          test: "hello"
        policy:
          rules:
            - when: "{{ output.status == 'error' and output.error.retryable }}"
              then:
                do: retry
                attempts: 3
                backoff: exponential
                delay: 0.5
            - when: "{{ output.status == 'error' }}"
              then:
                do: fail
            - else:
                do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: process
          set:
            ctx.response_data: "{{ start.data }}"

  - step: process
    desc: "Process HTTP response"
    tool:
      kind: python
      spec:
        input:
          data: "{{ ctx.response_data }}"
        code: |
          print(f"Processing data: {data}")
          result = {"status": "processed", "data": data}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: "End workflow"
    tool:
      kind: python
      spec:
        input: {}
        code: |
          print("Workflow complete")
          result = {"status": "done"}
