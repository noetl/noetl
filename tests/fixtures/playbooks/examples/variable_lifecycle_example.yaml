apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: variable_lifecycle_example
  path: examples/variable_lifecycle
  description: Demonstrates BEFORE and AFTER execution variable patterns
workload:
  environment: production
  api_base_url: https://api.example.com
  retry_limit: 3
  user_id: '{{ payload.user_id }}'
  user_email: null
  user_status: null
  user_created: null
  email_domain: null
  user_score: 0
workflow:
- step: start
  desc: Entry point
  tool:
    kind: python
    spec:
      code: 'result = {"status": "initialized"}

        '
  set:
    ctx.user_email: '{{ workload.user_email }}'
    ctx.user_status: '{{ workload.user_status }}'
    ctx.user_created: '{{ workload.user_created }}'
    ctx.email_domain: '{{ workload.email_domain }}'
    ctx.user_score: '{{ workload.user_score }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: fetch_user_data
- step: fetch_user_data
  desc: Fetch user data using global variables
  tool:
  - name: fetch
    kind: http
    spec:
      method: GET
      endpoint: '{{ api_base_url }}/users/{{ user_id }}'
      headers:
        X-Environment: '{{ environment }}'
      policy:
        rules:
        - when: '{{ output.status == ''error'' }}'
          then:
            do: fail
        - else:
            do: continue
            set:
              ctx.user_email: '{{ output.data.email }}'
              ctx.user_status: '{{ output.data.status }}'
              ctx.user_created: '{{ output.data.created_at }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: calculate_metrics
- step: calculate_metrics
  desc: Calculate metrics using args from previous step
  tool:
    kind: python
    spec:
      input:
        email: '{{ ctx.user_email }}'
        status: '{{ ctx.user_status }}'
        retry_count: '{{ retry_limit }}'
      code: "metrics = {\n    \"email_domain\": email.split('@')[1] if '@' in email\
        \ else 'unknown',\n    \"is_active\": status == 'active',\n    \"max_retries\"\
        : retry_count,\n    \"score\": 100 if status == 'active' else 0\n}\nresult\
        \ = metrics\n"
      policy:
        rules:
        - else:
            do: continue
            set:
              ctx.email_domain: '{{ output.data.email_domain }}'
              ctx.user_score: '{{ output.data.score }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: active_user_flow
      when: '{{ ctx.user_status == ''active'' }}'
    - step: inactive_user_flow
      when: '{{ ctx.user_status != ''active'' }}'
- step: active_user_flow
  desc: Process active users with received args
  tool:
    kind: python
    spec:
      input:
        domain: '{{ ctx.email_domain }}'
        score: '{{ ctx.user_score }}'
        global_env: '{{ environment }}'
      code: "result = {\n    \"message\": f\"Active user in {global_env}\",\n    \"\
        domain\": domain,\n    \"bonus_score\": score + 10\n}\n"
  next:
    spec:
      mode: exclusive
    arcs:
    - step: store_results
- step: inactive_user_flow
  desc: Process inactive users
  tool:
    kind: python
    spec:
      input:
        email: '{{ ctx.user_email }}'
        status: '{{ ctx.user_status }}'
      code: "result = {\n    \"message\": f\"Inactive user: {email}\",\n    \"status\"\
        : status,\n    \"action\": \"send_reactivation_email\"\n}\n"
  next:
    spec:
      mode: exclusive
    arcs:
    - step: store_results
- step: store_results
  desc: Store results using direct step access
  tool:
    kind: python
    spec:
      input:
        user_email: '{{ ctx.user_email }}'
        user_score: '{{ ctx.user_score }}'
        environment: '{{ environment }}'
        active_result: '{{ active_user_flow.message if active_user_flow else ''N/A''
          }}'
        inactive_result: '{{ inactive_user_flow.message if inactive_user_flow else
          ''N/A'' }}'
      code: "result = {\n    \"stored_at\": \"2025-12-02T17:30:00Z\",\n    \"email\"\
        : user_email,\n    \"score\": user_score,\n    \"environment\": environment,\n\
        \    \"flow_result\": active_result if active_result != 'N/A' else inactive_result\n\
        }\nprint(f\"Stored results for {user_email} in {environment}\")\n"
  next:
    spec:
      mode: exclusive
    arcs:
    - step: end
- step: end
  desc: Workflow complete
  tool:
    kind: python
    spec:
      code: 'result = {"status": "complete"}

        '
