apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: http_pagination_v2
  path: examples/http_pagination_v2
  labels:
    category: example
    version: v10
    pattern: pagination
workload:
  api_url: https://api.example.com
  page_size: 100
  current_page: 1
  all_pages: []
workflow:
- step: start
  desc: Initialize pagination workflow
  tool:
    kind: python
    spec:
      code: 'result = {"status": "initialized"}

        '
  set:
    ctx.current_page: '{{ workload.current_page }}'
    ctx.all_pages: '{{ workload.all_pages }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: fetch_paginated
- step: fetch_paginated
  desc: Fetch data with pagination using tool.spec.policy.rules flow control
  tool:
  - name: init
    kind: noop
    spec:
      policy:
        rules:
        - else:
            do: continue
            set:
              iter.page: 1
              iter.has_more: true
              iter.items: []
  - name: fetch_page
    kind: http
    spec:
      method: GET
      endpoint: '{{ api_url }}/data'
      params:
        page: '{{ iter.page }}'
        pageSize: '{{ page_size }}'
      policy:
        rules:
        - when: '{{ output.status == ''error'' and output.http.status in [500, 502,
            503] }}'
          then:
            do: retry
            attempts: 3
            backoff: exponential
            delay: 0.5
        - when: '{{ output.status == ''error'' }}'
          then:
            do: fail
        - else:
            do: continue
            set:
              iter.has_more: '{{ output.data.paging.hasMore | default(false) }}'
              iter.page: '{{ output.data.paging.page | default(iter.page) }}'
              iter.items: '{{ output.data.items | default([]) }}'
  - name: collect_items
    kind: python
    spec:
      input:
        items: '{{ iter.items }}'
        all_pages: '{{ ctx.all_pages }}'
      code: '# Extend collection with new items

        all_pages.extend(items)

        result = {"all_pages": all_pages, "count": len(all_pages)}

        '
      policy:
        rules:
        - else:
            do: continue
            set:
              ctx.all_pages: '{{ output.data.all_pages }}'
  - name: paginate
    kind: noop
    spec:
      policy:
        rules:
        - when: '{{ iter.has_more == true }}'
          then:
            do: jump
            to: fetch_page
            set:
              iter.page: '{{ (iter.page | int) + 1 }}'
        - else:
            do: break
  next:
    spec:
      mode: exclusive
    arcs:
    - step: process_results
      set:
        ctx.paginated_items: '{{ ctx.all_pages }}'
- step: process_results
  desc: Process collected results
  tool:
    kind: python
    spec:
      input:
        items: '{{ ctx.paginated_items }}'
      code: 'print(f"Processing {len(items)} items")

        result = {"count": len(items), "status": "processed"}

        '
  next:
    spec:
      mode: exclusive
    arcs:
    - step: end
- step: end
  desc: End workflow
  tool:
    kind: python
    spec:
      code: 'result = {"status": "complete"}

        '
