apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: test_storage_tiers
  path: tests/storage_tiers_test
  description: |
    Test storage tier auto-selection based on result size.

    Storage Tiers (RisingWave-aligned, phase 0):
    - Inline: < 64KB (no externalization)
    - NATS KV: 64KB - 1MB
    - DISK: >= 1MB (local SSD cache + async cloud spill; phase 0 spills
      directly to the configured cloud tier)
    - S3/GCS: explicit durable

    The previous `NATS Object Store` probe has been replaced by a
    `DISK` probe that exercises the new large-payload routing path.
workload:
  inline_items: 100
  inline_item_size: 50
  kv_items: 500
  kv_item_size: 200
  disk_items: 2000
  disk_item_size: 1000
  large_items: 5000
  large_item_size: 3000
workflow:
- step: start
  tool:
  - name: generate_inline
    kind: python
    input:
      count: '{{ inline_items }}'
      size: '{{ inline_item_size }}'
    code: "items = [{\"id\": i, \"data\": \"x\" * size} for i in range(count)]\nresult\
      \ = {\n    \"status\": \"ok\",\n    \"tier\": \"inline\",\n    \"count\": len(items),\n\
      \    \"total_bytes\": count * size,\n    \"items\": items\n}\n"
  output:
    output_select:
    - status
    - tier
    - count
    - total_bytes
  next:
    spec:
      mode: exclusive
    arcs:
    - step: test_nats_kv
- step: test_nats_kv
  tool:
  - name: generate_kv
    kind: python
    input:
      count: '{{ kv_items }}'
      size: '{{ kv_item_size }}'
    code: "items = [{\"id\": i, \"data\": \"K\" * size, \"active\": True} for i in\
      \ range(count)]\nresult = {\n    \"status\": \"ok\",\n    \"tier\": \"kv_expected\"\
      ,\n    \"count\": len(items),\n    \"total_bytes\": count * size,\n    \"items\"\
      : items\n}\n"
  output:
    output_select:
    - status
    - tier
    - count
    - total_bytes
  next:
    spec:
      mode: exclusive
    arcs:
    - step: test_disk
- step: test_disk
  tool:
  - name: generate_disk
    kind: python
    input:
      count: '{{ disk_items }}'
      size: '{{ disk_item_size }}'
    code: "items = [{\"id\": i, \"data\": \"D\" * size, \"active\": True} for i in\
      \ range(count)]\nresult = {\n    \"status\": \"ok\",\n    \"tier\": \"disk_expected\"\
      ,\n    \"count\": len(items),\n    \"total_bytes\": count * size,\n    \"items\"\
      : items\n}\n"
  output:
    output_select:
    - status
    - tier
    - count
    - total_bytes
  next:
    spec:
      mode: exclusive
    arcs:
    - step: test_large_storage
- step: test_large_storage
  tool:
  - name: generate_large
    kind: python
    input:
      count: '{{ large_items }}'
      size: '{{ large_item_size }}'
    code: "items = [{\"id\": i, \"data\": \"L\" * size, \"active\": True} for i in\
      \ range(count)]\nresult = {\n    \"status\": \"ok\",\n    \"tier\": \"cloud_expected\"\
      ,\n    \"count\": len(items),\n    \"total_bytes\": count * size,\n    \"items\"\
      : items\n}\n"
  output:
    output_select:
    - status
    - tier
    - count
    - total_bytes
  next:
    spec:
      mode: exclusive
    arcs:
    - step: verify_storage_tiers
- step: verify_storage_tiers
  tool:
  - name: verify_tiers
    kind: python
    input:
      inline_has_ref: '{{ start._ref is defined }}'
      inline_status: '{{ start.status }}'
      inline_bytes: '{{ start.total_bytes }}'
      kv_has_ref: '{{ test_nats_kv._ref is defined }}'
      kv_store: '{{ test_nats_kv._store | default(''none'') }}'
      kv_status: '{{ test_nats_kv.status }}'
      kv_bytes: '{{ test_nats_kv.total_bytes }}'
      disk_has_ref: '{{ test_disk._ref is defined }}'
      disk_store: '{{ test_disk._store | default(''none'') }}'
      disk_status: '{{ test_disk.status }}'
      disk_bytes: '{{ test_disk.total_bytes }}'
      large_has_ref: '{{ test_large_storage._ref is defined }}'
      large_store: '{{ test_large_storage._store | default(''none'') }}'
      large_status: '{{ test_large_storage.status }}'
      large_bytes: '{{ test_large_storage.total_bytes }}'
    code: |
      results = {
          "inline": {
              "externalized": inline_has_ref,
              "expected_externalized": False,  # Under 64KB threshold
              "status": inline_status,
              "bytes": inline_bytes,
              "correct": not inline_has_ref
          },
          "nats_kv": {
              "externalized": kv_has_ref,
              "store": kv_store,
              "expected_store": "kv",
              "status": kv_status,
              "bytes": kv_bytes,
              "correct": kv_has_ref and kv_store == "kv"
          },
          "disk": {
              "externalized": disk_has_ref,
              "store": disk_store,
              # Phase 0: DISK spills to the configured cloud tier (s3 / gcs).
              # Phase 1 will have a local disk-cache backend of its own.
              "expected_store": "disk | s3 | gcs",
              "status": disk_status,
              "bytes": disk_bytes,
              "correct": disk_has_ref and disk_store in ("disk", "s3", "gcs")
          },
          "large_storage": {
              "externalized": large_has_ref,
              "store": large_store,
              "expected_store": "disk | s3 | gcs",
              "status": large_status,
              "bytes": large_bytes,
              "correct": large_has_ref and large_store in ("disk", "s3", "gcs")
          }
      }

      all_correct = all(r["correct"] for r in results.values())

      result = {
          "test_result": "PASSED" if all_correct else "FAILED",
          "all_tiers_correct": all_correct,
          "tier_results": results,
          "summary": {
              "inline_correct": results["inline"]["correct"],
              "kv_correct": results["nats_kv"]["correct"],
              "disk_correct": results["disk"]["correct"],
              "large_correct": results["large_storage"]["correct"]
          }
      }
  next:
    spec:
      mode: exclusive
    arcs:
    - step: load_kv_data
- step: load_kv_data
  tool:
  - name: load_kv
    kind: artifact
    action: get
    input:
      result_ref: '{{ test_nats_kv._ref }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: load_disk_data
- step: load_disk_data
  tool:
  - name: load_disk
    kind: artifact
    action: get
    input:
      result_ref: '{{ test_disk._ref }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: load_large_data
- step: load_large_data
  tool:
  - name: load_large
    kind: artifact
    action: get
    input:
      result_ref: '{{ test_large_storage._ref }}'
  next:
    spec:
      mode: exclusive
    arcs:
    - step: final_summary
- step: final_summary
  tool:
  - name: summarize
    kind: python
    input:
      tier_results: '{{ verify_storage_tiers.tier_results }}'
      kv_loaded_count: '{{ load_kv_data.count | default(0) }}'
      disk_loaded_count: '{{ load_disk_data.count | default(0) }}'
      large_loaded_count: '{{ load_large_data.count | default(0) }}'
    code: |
      load_results = {
          "kv_loaded": kv_loaded_count == 500,
          "kv_count": kv_loaded_count,
          "disk_loaded": disk_loaded_count == 2000,
          "disk_count": disk_loaded_count,
          "large_loaded": large_loaded_count == 5000,
          "large_count": large_loaded_count
      }

      all_loaded = all([
          load_results["kv_loaded"],
          load_results["disk_loaded"],
          load_results["large_loaded"]
      ])

      all_tiers_correct = all(r["correct"] for r in tier_results.values())

      result = {
          "test_result": "PASSED" if (all_loaded and all_tiers_correct) else "FAILED",
          "storage_tier_selection": "PASSED" if all_tiers_correct else "FAILED",
          "lazy_loading": "PASSED" if all_loaded else "FAILED",
          "tier_details": tier_results,
          "load_details": load_results,
          "message": "All storage tiers working correctly" if (all_loaded and all_tiers_correct) else "Some tests failed"
      }
