apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: kind_playbook_lease_expiry_worker
  path: tests/fixtures/playbooks/batch_execution/kind_playbook_lease_expiry_worker
  description: |
    Chunk worker for lease expiry regression test (combined trigger approach).

    Two mechanisms together guarantee NATS lease expiry → duplicate batch workers:

    Mechanism 1 — large parent context (~900KB):
      Parent playbook builds 6 × 5000-row ctx arrays before dispatching workers.
      Server must JSON-deserialize + Jinja2-render ~900KB per dispatch call.
      Under concurrent load this makes each dispatch take 2-5s CPU, so with
      many batches queued simultaneously, some dispatches exceed the 120s lease.

    Mechanism 2 — long-running worker (simulate_api_delay step):
      Each worker sleeps 130s before processing items, simulating the real MDS
      bottleneck: external API response latency + NATS queue placement +
      NoETL synchronization overhead. With max_in_flight: 1 in the parent, the
      parent holds its NATS command lease while waiting for this worker. The
      130s sleep guarantees the 120s lease expires for every single batch,
      causing command.failed → reclaim → duplicate chunk worker for same offset.

    Combined effect:
      Both mechanisms fire simultaneously. The parent's run_batch_workers loop
      dispatches a child, the child sleeps 130s, the parent's lease expires,
      the command is reclaimed, a new child is spawned for the same batch offset.
      The duplicate child upserts the same rows (ON CONFLICT DO UPDATE), so
      stress_test_results count never grows beyond one batch's worth of rows.

    Bug condition (without ctx_step_09 set_ctx clearing):
      Parent context ~900KB + worker 130s sleep → lease expires reliably.

    Fix condition (with ctx_step_09 set_ctx clearing):
      Parent context ~20KB → dispatch fast. But worker still sleeps 130s,
      so the fix must also address the lease timeout for long-running children
      (e.g. increase NATS consumer ack_wait, or use a different dispatch pattern).

workload:
  pg_auth: pg_k8s
  batch_number: 1
  offset: 0
  batch_size: 50
  item_delay_seconds: 1
  api_delay_seconds: 130

workflow:

  - step: start
    desc: Initialize chunk worker inputs
    tool:
      kind: python
      args:
        batch_number: '{{ batch_number }}'
        offset: '{{ offset }}'
        batch_size: '{{ batch_size }}'
        item_delay_seconds: '{{ item_delay_seconds }}'
        api_delay_seconds: '{{ api_delay_seconds }}'
      code: |
        def _to_int(value, default):
            try:
                return int(value)
            except (TypeError, ValueError):
                return default

        result = {
            "status": "initialized",
            "batch_number": _to_int(batch_number, 1),
            "offset": _to_int(offset, 0),
            "batch_size": _to_int(batch_size, 50),
            "item_delay_seconds": _to_int(item_delay_seconds, 1),
            "api_delay_seconds": _to_int(api_delay_seconds, 130),
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: fetch_batch

  - step: fetch_batch
    desc: |
      Fetch one batch of items using deterministic OFFSET/LIMIT.
      Mirrors mds_batch_worker.fetch_mds_batch.
    tool:
      kind: postgres
      auth: '{{ pg_auth }}'
      query: |
        SELECT item_id, group_id
        FROM public.stress_test_items
        ORDER BY item_id ASC
        OFFSET {{ offset | int }}
        LIMIT {{ batch_size | int }};
    next:
      spec: { mode: exclusive }
      arcs:
        - step: normalize_batch

  - step: normalize_batch
    desc: Extract rows. Mirrors mds_batch_worker.normalize_mds_batch.
    tool:
      kind: python
      args:
        db_result: '{{ fetch_batch }}'
      code: |
        rows = db_result.get("command_0", {}).get("rows", []) if isinstance(db_result, dict) else []
        result = {
            "batch_rows": rows,
            "batch_count": len(rows),
            "has_rows": len(rows) > 0,
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: simulate_api_delay
          when: '{{ (normalize_batch.has_rows | string | lower) == "true" }}'
        - step: summarize

  - step: simulate_api_delay
    desc: |
      Simulate external API latency + NATS queue placement + NoETL sync overhead.
      Mirrors the real MDS bottleneck: fetch_mds_details HTTP calls to AthenaHealth API,
      NATS message dispatch, and NoETL execution synchronization all add up to >120s
      under load. Here we use a single pg_sleep(api_delay_seconds) to reproduce that
      total delay deterministically.

      This is mechanism 2: with max_in_flight: 1 in the parent, the parent holds its
      NATS command lease for this loop iteration while this worker runs. A 130s sleep
      guarantees the 120s lease expires, causing command.failed → reclaim → duplicate.
    tool:
      kind: postgres
      auth: '{{ pg_auth }}'
      query: |
        SELECT pg_sleep({{ api_delay_seconds | int }}) AS slept,
               {{ batch_number | int }}               AS batch_number,
               {{ offset | int }}                     AS batch_offset;
    next:
      spec: { mode: exclusive }
      arcs:
        - step: process_items

  - step: process_items
    desc: |
      Process each item in parallel. Mirrors mds_batch_worker.fetch_mds_details.
      Uses pg_sleep to simulate per-item HTTP call latency and generate server load.
      max_in_flight: 10 + exec: distributed exercises the NATS claim protocol at scale,
      creating concurrent server load while the parent tries to dispatch the next batch.
    loop:
      in: '{{ normalize_batch.batch_rows }}'
      iterator: item
      spec:
        mode: parallel
        max_in_flight: 10
        policy:
          exec: distributed
    tool:
      - name: do_work
        kind: postgres
        auth: '{{ pg_auth }}'
        command: |
          INSERT INTO public.stress_test_results (item_id, result_data)
          VALUES (
            {{ iter.item.item_id }},
            jsonb_build_object(
              'item_id', {{ iter.item.item_id }},
              'group_id', {{ iter.item.group_id }},
              'processed_at', now()::text,
              'worker_delay', {{ item_delay_seconds | int }},
              'batch_number', {{ batch_number | int }}
            )
          )
          ON CONFLICT (item_id) DO UPDATE SET
            result_data = EXCLUDED.result_data,
            processed_at = NOW();

          SELECT pg_sleep({{ item_delay_seconds | int }});
        spec:
          policy:
            rules:
              - else:
                  then: { do: break }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: summarize
          when: "{{ event.name == 'loop.done' }}"

  - step: summarize
    desc: Return batch summary
    tool:
      kind: python
      args:
        normalize: '{{ normalize_batch }}'
        batch_number: '{{ batch_number }}'
      code: |
        batch_count = int(normalize.get("batch_count", 0) or 0) if isinstance(normalize, dict) else 0
        result = {
            "status": "completed",
            "batch_number": int(batch_number or 1),
            "batch_count": batch_count,
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: end
    desc: End worker
    tool:
      kind: python
      code: |
        result = {"status": "completed"}
