apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: amadeus_ai_token_smoke
  path: api_integration/amadeus_ai_token_smoke
  description: Smoke test for OpenAI + Amadeus credentials using the same token sources as amadeus_ai_api

workload:
  gcp_auth: google_oauth
  openai_secret_path: projects/1014428265962/secrets/openai-api-key/versions/1
  amadeus_key_path: projects/1014428265962/secrets/api-key-test-api-amadeus-com/versions/1
  amadeus_secret_path: projects/1014428265962/secrets/api-secret-test-api-amadeus-com/versions/1
  openai_models_url: https://api.openai.com/v1/models
  amadeus_api_url: https://test.api.amadeus.com

keychain:
  - name: openai_token
    kind: secret_manager
    provider: gcp
    scope: global
    auth: "{{ gcp_auth }}"
    map:
      api_key: "{{ openai_secret_path }}"

  - name: amadeus_credentials
    kind: secret_manager
    provider: gcp
    scope: global
    auth: "{{ gcp_auth }}"
    map:
      client_id: "{{ amadeus_key_path }}"
      client_secret: "{{ amadeus_secret_path }}"

  - name: amadeus_token
    kind: oauth2
    scope: global
    auto_renew: true
    endpoint: "{{ amadeus_api_url }}/v1/security/oauth2/token"
    method: POST
    headers:
      Content-Type: application/x-www-form-urlencoded
    data:
      grant_type: client_credentials
      client_id: "{{ keychain.amadeus_credentials.client_id }}"
      client_secret: "{{ keychain.amadeus_credentials.client_secret }}"

workflow:
  - step: start
    desc: Start smoke test
    tool:
      kind: noop
    next:
      spec: { mode: exclusive }
      arcs:
        - step: check_openai_models

  - step: check_openai_models
    desc: Verify OpenAI key by listing models
    tool:
      kind: http
      method: GET
      url: "{{ openai_models_url }}"
      headers:
        Authorization: "Bearer {{ keychain.openai_token.api_key }}"
        Content-Type: application/json
    next:
      spec: { mode: exclusive }
      arcs:
        - step: check_amadeus_airport_lookup

  - step: check_amadeus_airport_lookup
    desc: Verify Amadeus token by querying airport reference data
    tool:
      kind: http
      method: GET
      url: "{{ amadeus_api_url }}/v1/reference-data/locations?subType=AIRPORT&keyword=SFO&page%5Blimit%5D=1"
      headers:
        Authorization: "Bearer {{ keychain.amadeus_token.access_token }}"
        Content-Type: application/json
    next:
      spec: { mode: exclusive }
      arcs:
        - step: summarize

  - step: summarize
    desc: Build compact smoke test report
    tool:
      kind: python
      args:
        openai_response: "{{ check_openai_models }}"
        amadeus_response: "{{ check_amadeus_airport_lookup }}"
      code: |
        def status_of(resp):
            if isinstance(resp, dict):
                return resp.get("status_code") or resp.get("status")
            return None

        openai_status = status_of(openai_response)
        amadeus_status = status_of(amadeus_response)

        result = {
            "openai_status": openai_status,
            "amadeus_status": amadeus_status,
            "openai_ok": openai_status == 200,
            "amadeus_ok": amadeus_status == 200,
        }

        if not (result["openai_ok"] and result["amadeus_ok"]):
            raise Exception(f"Token smoke test failed: {result}")
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: end
    desc: End smoke test
    tool:
      kind: noop
