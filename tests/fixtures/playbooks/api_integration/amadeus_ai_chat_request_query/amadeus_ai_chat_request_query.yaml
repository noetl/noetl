apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: amadeus_ai_chat_request_query
  path: api_integration/amadeus_ai_chat_request_query
  description: Amadeus API integration with OpenAI-driven structured intent extraction
  version: "1.1"

workload:
  pg_auth: pg_k8s
  gcp_auth: google_oauth
  openai_secret_path: projects/1014428265962/secrets/openai-api-key/versions/1
  amadeus_key_path: projects/1014428265962/secrets/api-key-test-api-amadeus-com/versions/1
  amadeus_secret_path: projects/1014428265962/secrets/api-secret-test-api-amadeus-com/versions/1
  api_url: https://test.api.amadeus.com
  query: I need a one-way flight from SFO to JFK on 2026-07-15 for 1 adult

keychain:
  - name: openai_token
    kind: secret_manager
    provider: gcp
    scope: global
    auth: "{{ gcp_auth }}"
    map:
      api_key: "{{ openai_secret_path }}"

  - name: amadeus_credentials
    kind: secret_manager
    provider: gcp
    scope: global
    auth: "{{ gcp_auth }}"
    map:
      client_id: "{{ amadeus_key_path }}"
      client_secret: "{{ amadeus_secret_path }}"

  - name: amadeus_token
    kind: oauth2
    scope: global
    auto_renew: true
    endpoint: https://test.api.amadeus.com/v1/security/oauth2/token
    method: POST
    headers:
      Content-Type: application/x-www-form-urlencoded
    data:
      grant_type: client_credentials
      client_id: "{{ keychain.amadeus_credentials.client_id }}"
      client_secret: "{{ keychain.amadeus_credentials.client_secret }}"

workflow:
  - step: start
    desc: Ensure sink table exists for deterministic fixture behavior
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      query: |
        CREATE TABLE IF NOT EXISTS api_results (
          id BIGSERIAL PRIMARY KEY,
          execution_id TEXT NOT NULL,
          source TEXT NOT NULL,
          result JSONB NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );
    next:
      spec: { mode: exclusive }
      arcs:
        - step: analyze_user_intent

  - step: analyze_user_intent
    desc: Ask OpenAI to produce strict JSON intent output
    tool:
      kind: http
      method: POST
      url: https://api.openai.com/v1/chat/completions
      headers:
        Authorization: "Bearer {{ keychain.openai_token.api_key }}"
        Content-Type: application/json
      payload:
        model: gpt-4o-mini
        messages:
          - role: system
            content: |
              You are an intent analyzer for travel planning.

              Return JSON only.

              If input is incomplete, return:
              {
                "status": "needs_clarification",
                "missing": ["field"],
                "questions": ["question"]
              }

              If complete, return:
              {
                "status": "ready",
                "endpoint": "/v2/shopping/flight-offers",
                "params": {
                  "originLocationCode": "SFO",
                  "destinationLocationCode": "JFK",
                  "departureDate": "2026-07-15",
                  "adults": 1,
                  "max": 3
                }
              }

              Rules:
              - endpoint must be one of: /v2/shopping/flight-offers
              - dates must be YYYY-MM-DD
              - max must not exceed 3
          - role: user
            content: "{{ workload.query }}"
        temperature: 0.1
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_intent_result

  - step: parse_intent_result
    desc: Parse and normalize OpenAI response into deterministic structure
    tool:
      kind: python
      libs:
        json: json
        re: re
      args:
        response: "{{ analyze_user_intent }}"
      code: |
        result = None
        raw = ""
        data = response.get("data", {}) if isinstance(response, dict) else {}
        choices = data.get("choices", []) if isinstance(data, dict) else []
        if choices:
            raw = choices[0].get("message", {}).get("content", "")

        raw = (raw or "").strip()
        if raw.startswith("```"):
            raw = re.sub(r"^```\\w*\\n?", "", raw)
            raw = re.sub(r"\\n?```$", "", raw).strip()

        parsed = {}
        if raw:
            try:
                parsed = json.loads(raw)
            except Exception as e:
                result = {
                    "status": "error",
                    "message": f"invalid_json: {e}",
                    "raw": raw,
                }
        if result is None:
            status = parsed.get("status")
            if status == "ready":
                result = {
                    "status": "ready",
                    "endpoint": parsed.get("endpoint", ""),
                    "params": parsed.get("params", {}),
                }
            elif status == "needs_clarification":
                result = {
                    "status": "needs_clarification",
                    "missing": parsed.get("missing", []),
                    "questions": parsed.get("questions", []),
                }
            else:
                result = {
                    "status": "error",
                    "message": "unexpected_status",
                    "raw": parsed,
                }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: build_amadeus_query
          when: "{{ parse_intent_result.status == 'ready' }}"
        - step: store_clarification_request
          when: "{{ parse_intent_result.status == 'needs_clarification' }}"
        - step: store_parse_error
          when: "{{ parse_intent_result.status == 'error' }}"

  - step: build_amadeus_query
    desc: Validate endpoint and normalize query parameters
    tool:
      kind: python
      args:
        intent: "{{ parse_intent_result }}"
        api_url: "{{ workload.api_url }}"
      code: |
        from urllib.parse import urlencode

        endpoint = intent.get("endpoint", "") if isinstance(intent, dict) else ""
        params = intent.get("params", {}) if isinstance(intent, dict) else {}
        params = params if isinstance(params, dict) else {}

        allowed = {"/v2/shopping/flight-offers"}
        if endpoint not in allowed:
            result = {
                "status": "error",
                "message": f"unsupported_endpoint: {endpoint}",
                "endpoint": endpoint,
                "params": params,
            }
        else:
            missing = []
            for field in ("originLocationCode", "destinationLocationCode", "departureDate"):
                if not params.get(field):
                    missing.append(field)
            if missing:
                result = {
                    "status": "needs_clarification",
                    "missing": missing,
                    "questions": [f"Please provide {', '.join(missing)}."],
                }
            else:
                max_results = params.get("max", 3)
                try:
                    max_results = int(max_results)
                except Exception:
                    max_results = 3
                if max_results < 1:
                    max_results = 1
                if max_results > 3:
                    max_results = 3
                params["max"] = max_results

                query_url = f"{api_url.rstrip('/')}{endpoint}?{urlencode(params)}"
                result = {
                    "status": "ready",
                    "endpoint": endpoint,
                    "params": params,
                    "query_url": query_url,
                }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: execute_amadeus_query
          when: "{{ build_amadeus_query.status == 'ready' }}"
        - step: store_clarification_request
          when: "{{ build_amadeus_query.status == 'needs_clarification' }}"
        - step: store_validation_error
          when: "{{ build_amadeus_query.status == 'error' }}"

  - step: execute_amadeus_query
    desc: Call Amadeus API using validated endpoint and params
    tool:
      kind: http
      method: GET
      url: "{{ build_amadeus_query.query_url }}"
      headers:
        Authorization: "Bearer {{ keychain.amadeus_token.access_token }}"
    next:
      spec: { mode: exclusive }
      arcs:
        - step: store_amadeus_result

  - step: store_clarification_request
    desc: Persist clarification payload for client follow-up
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      query: |
        INSERT INTO api_results (execution_id, source, result)
        VALUES (
          '{{ execution_id }}',
          'intent_clarification',
          $json${{ parse_intent_result | tojson }}$json$::jsonb
        );
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: store_parse_error
    desc: Persist parse failures for debugging
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      query: |
        INSERT INTO api_results (execution_id, source, result)
        VALUES (
          '{{ execution_id }}',
          'intent_error',
          $json${{ parse_intent_result | tojson }}$json$::jsonb
        );
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: store_validation_error
    desc: Persist intent validation failures for debugging
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      query: |
        INSERT INTO api_results (execution_id, source, result)
        VALUES (
          '{{ execution_id }}',
          'intent_validation_error',
          $json${{ build_amadeus_query | tojson }}$json$::jsonb
        );
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: store_amadeus_result
    desc: Persist raw Amadeus response
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      query: |
        INSERT INTO api_results (execution_id, source, result)
        VALUES (
          '{{ execution_id }}',
          'amadeus_api',
          $json${{ execute_amadeus_query.data | tojson }}$json$::jsonb
        );
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: end
    desc: End workflow
    tool:
      kind: noop
