# NoETL Canonical v10 Playbook
# Simple Python test

apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: simple_python_test
  path: test/simple_python
  description: Simple Python test for the worker

workload:
  message: "Hello from NoETL"

workflow:
  - step: start
    tool:
      kind: python
      input:
        message: "{{ message }}"
      code: |
        print(f"Processing: {message}")
        result = {
            "status": "ok",
            "message": message,
            "timestamp": "2025-12-11"
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: Workflow complete
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "completed"}
