  # ------------------------------------------------------------------
  # FETCH DEMOGRAPHICS (non-paginated)
  # ------------------------------------------------------------------
  - step: load_patients_for_demographics
    desc: Count remaining patients that still need demographics data.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        WITH reclaim_stale AS (
          UPDATE public.pft_test_patient_work_queue
          SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'demographics'
            AND status = 'claimed'
            AND claimed_at < NOW() - INTERVAL '5 minutes'
          RETURNING patient_id
        )
        SELECT COUNT(*) AS remaining_count
        FROM public.pft_test_patient_work_queue q
        WHERE q.execution_id = '{{ execution_id }}'
          AND EXISTS (
            SELECT 1
            FROM public.pft_test_patient_ids_work w
            WHERE w.patient_id = q.patient_id
              AND w.facility_mapping_id = q.facility_mapping_id
          )
          AND q.data_type = 'demographics'
