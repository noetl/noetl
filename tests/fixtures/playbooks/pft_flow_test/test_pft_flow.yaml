        - step: prepare_mds_work
          when: '{{ (output.data.rows[0].remaining_count | default(0) | int) == 0 }}'
    set:
      ctx.patients_needing_demographics_count: '{{ output.data.rows[0].remaining_count | default(0) }}'

  - step: fetch_demographics
    desc: |
      Fetch/process/save demographics in fixed-size claim batches (no patient-id array handoff).
      Non-paginated: single HTTP call per patient.
    loop:
      in: '{{ batch_slots }}'
      iterator: slot
      spec:
        mode: parallel
        max_in_flight: 5
    tool:
      - name: claim_patient
        kind: postgres
        auth: pg_k8s
        command: |
          WITH candidate AS (
            SELECT q.patient_id, q.facility_mapping_id
            FROM public.pft_test_patient_work_queue q
            WHERE q.execution_id = '{{ execution_id }}'
              AND EXISTS (
                SELECT 1
                FROM public.pft_test_patient_ids_work w
                WHERE w.patient_id = q.patient_id
                  AND w.facility_mapping_id = q.facility_mapping_id
              )
              AND q.data_type = 'demographics'
              AND q.status = 'pending'
            ORDER BY q.patient_id
            FOR UPDATE SKIP LOCKED
            LIMIT 1
          ),
          claimed AS (
            UPDATE public.pft_test_patient_work_queue q
            SET status = 'claimed',
                attempt_count = q.attempt_count + 1,
                worker_id = '{{ execution_id }}:demographics:{{ slot }}',
                claimed_at = NOW(),
                updated_at = NOW()
            FROM candidate c
            WHERE q.execution_id = '{{ execution_id }}'
              AND q.facility_mapping_id = c.facility_mapping_id
              AND q.data_type = 'demographics'
              AND q.patient_id = c.patient_id
            RETURNING q.patient_id, q.facility_mapping_id
          )
          SELECT patient_id, facility_mapping_id FROM claimed;
        spec:
          policy:
            rules:
              - when: '{{ (output.data.row_count | default(0) | int) == 0 }}'
