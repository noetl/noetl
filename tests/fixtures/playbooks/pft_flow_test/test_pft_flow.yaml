                    set:
                      iter.patient_id: '{{ output.data.rows[0].patient_id }}'
                      iter.facility_mapping_id: '{{ output.data.rows[0].facility_mapping_id }}'
      - name: fetch
        kind: http
        method: GET
        url: '{{ api_url }}/api/v1/patient/demographics'
        params:
          patientId: '{{ iter.patient_id }}'
        spec:
          policy:
            rules:
              - when: '{{ output.status == "error" and (output.http.status in [400, 404]) }}'
                then:
                  do: continue
                  set:
                    iter.skip_save: true
                    iter.fetch_data: {}
              - when: '{{ output.status == "error" }}'
                then:
                  do: retry
                  attempts: 3
              - else:
                  then:
                    do: continue
                    set:
                      iter.skip_save: false
                      iter.fetch_data: '{{ output.data.data }}'
      - name: save
        kind: postgres
        auth: pg_k8s
        command: |
          -- INJECTED BUG: Generate syntax error for patient 15 to test silent-failure fallback
          {{ "SYNTAX_ERROR_INJECTED_FOR_TEST {" if iter.patient_id | int == 15 else "" }}
          INSERT INTO public.pft_test_patient_demographics (pcc_patient_id, facility_mapping_id, payload)
          SELECT
            {{ iter.patient_id }},
            {{ iter.facility_mapping_id | int }},
