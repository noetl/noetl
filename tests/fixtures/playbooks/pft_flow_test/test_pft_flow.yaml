      - name: mark_done
        kind: postgres
        auth: pg_k8s
        command: |
          UPDATE public.pft_test_patient_work_queue q
          SET status = 'done',
              done_at = NOW(),
              worker_id = NULL,
              updated_at = NOW()
          WHERE q.execution_id = '{{ execution_id }}'
            AND q.facility_mapping_id = {{ iter.facility_mapping_id | int }}
            AND q.data_type = 'demographics'
            AND q.patient_id = {{ iter.patient_id | int }};
        spec:
          policy:
            rules:
              - else:
                  then:
                    do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: load_patients_for_demographics
          when: '{{ event.name == "loop.done" }}'

  # ------------------------------------------------------------------
  # MDS BATCH PROCESSING (sub-playbook)
  # ------------------------------------------------------------------
  - step: prepare_mds_work
    desc: |
      Clear old MDS work entries for this facility and populate from assessments.
      Each assessment page row generates one synthetic MDS assessment ID.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        DELETE FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ facility_mapping_id | int }};

        INSERT INTO public.pft_test_mds_assessment_ids_work (assessment_id, pcc_patient_id, facility_mapping_id)
        SELECT
          'MDS-' || pcc_patient_id || '-' || page_number AS assessment_id,
          pcc_patient_id,
          facility_mapping_id
        FROM public.pft_test_patient_assessments
        WHERE facility_mapping_id = {{ facility_mapping_id | int }}
          AND is_last_page = TRUE
        ON CONFLICT (assessment_id) DO NOTHING;

        SELECT COUNT(*) AS mds_assessment_count
        FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ facility_mapping_id | int }};
    next:
      spec:
        mode: exclusive
      arcs:
        - step: count_mds_assessments

  - step: count_mds_assessments
    desc: Count MDS assessments pending for this facility
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT COUNT(*) AS mds_assessment_count
        FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ facility_mapping_id | int }};
    next:
      spec:
        mode: exclusive
      arcs:
        - step: build_mds_batch_plan

  - step: build_mds_batch_plan
    desc: Compute OFFSET/LIMIT batch windows for MDS worker dispatch
    tool:
      kind: python
      input:
        total_count: '{{ count_mds_assessments.rows[0].mds_assessment_count }}'
      code: |
        def _to_int(v, d):
            try:
                return int(v)
            except (TypeError, ValueError):
                return d

        total = _to_int(total_count, 0)
        batch_size = 50
        batches = []
        for idx in range(0, total, batch_size):
            batch_number = (idx // batch_size) + 1
            limit = min(batch_size, total - idx)
            batches.append({
                "batch_number": batch_number,
                "offset": idx,
                "limit": limit,
            })
        result = {
            "batches": batches,
            "batch_count": len(batches),
            "total_count": total,
            "batch_size": batch_size,
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: run_mds_batch_workers
          when: '{{ (output.data.batch_count | int) > 0 }}'
        - step: validate_facility_results
          when: '{{ (output.data.batch_count | int) == 0 }}'
    set:
      ctx.mds_batch_count: '{{ output.data.batch_count | default(0) }}'

  - step: run_mds_batch_workers
    desc: Dispatch MDS batch workers serially (max_in_flight 1) via sub-playbook
    # Use extracted field build_mds_batch_plan.batches directly — avoids STATE-LOAD
    # failure when output.data.batches is unavailable (externalized result → ctx.mds_batches
    # defaults to [] and loop fires immediately without dispatching any sub-playbooks).
    loop:
      in: '{{ build_mds_batch_plan.batches }}'
      iterator: batch
      spec:
        mode: parallel
        max_in_flight: 1
    tool:
      kind: playbook
      path: tests/fixtures/playbooks/pft_flow_test/test_mds_batch_worker
      return_step: end
      timeout: 300
      input:
        pg_auth: pg_k8s
        api_url: '{{ api_url }}'
        facility_mapping_id: '{{ facility_mapping_id }}'
        batch_number: '{{ iter.batch.batch_number }}'
        offset: '{{ iter.batch.offset }}'
        batch_size: '{{ iter.batch.limit }}'
    next:
      spec:
        mode: exclusive
      arcs:
        - step: validate_facility_results
          when: '{{ event.name == "loop.done" }}'

  # ------------------------------------------------------------------
  # FACILITY VALIDATION + COMPLETION
  # ------------------------------------------------------------------
  - step: validate_facility_results
    desc: |
      Count ACTUAL fetched patient data per data type (not queued claims).
      This is the true correctness check: a patient is "done" only when data
      was saved to the result tables, not just when a patient was claimed.
      With the v2.14.7 loop.done race bug, queue entries can be marked done for all
      patients but data is only saved for ~1 batch worth (100 patients) before
      the race fires loop.done prematurely and cuts off subsequent batches.
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_assessments
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS assessments_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_conditions
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS conditions_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_medications
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS medications_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_vital_signs
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS vital_signs_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_demographics
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS demographics_done,
          (SELECT COUNT(DISTINCT patient_id) FROM public.pft_test_patient_work_queue
           WHERE execution_id = '{{ execution_id }}'
             AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
             AND data_type = 'assessments'
             AND status = 'done') AS assessments_queue_done;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: log_facility_validation

  - step: log_facility_validation
    desc: |
      Write per-facility validation results to log table and print summary.
      References validate_facility_results step directly — avoids step-level input:
      scoping issues and ctx.facility_validation STATE-LOAD loss.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        INSERT INTO public.pft_test_validation_log (
          execution_id, facility_mapping_id,
          assessments_done, conditions_done, medications_done,
          vital_signs_done, demographics_done, assessments_queue_done, total_expected
        )
        VALUES (
          '{{ execution_id }}',
          {{ ctx.facility_mapping_id | int }},
          {{ validate_facility_results.rows[0].assessments_done | default(0) }},
          {{ validate_facility_results.rows[0].conditions_done | default(0) }},
          {{ validate_facility_results.rows[0].medications_done | default(0) }},
          {{ validate_facility_results.rows[0].vital_signs_done | default(0) }},
          {{ validate_facility_results.rows[0].demographics_done | default(0) }},
          {{ validate_facility_results.rows[0].assessments_queue_done | default(0) }},
          1000
        )
        ON CONFLICT (execution_id, facility_mapping_id) DO UPDATE SET
          assessments_done       = EXCLUDED.assessments_done,
          conditions_done        = EXCLUDED.conditions_done,
          medications_done       = EXCLUDED.medications_done,
          vital_signs_done       = EXCLUDED.vital_signs_done,
          demographics_done      = EXCLUDED.demographics_done,
          assessments_queue_done = EXCLUDED.assessments_queue_done,
          logged_at              = NOW();

        SELECT 'logged' AS status;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: mark_facility_processed

  - step: mark_facility_processed
    desc: Mark current facility as done (active=false) and loop back if more remain
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        UPDATE public.pft_test_facilities
        SET active = FALSE, updated_at = NOW()
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};

        SELECT COUNT(*) AS remaining_count FROM public.pft_test_facilities WHERE active = TRUE;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: load_next_facility
          when: '{{ (output.data.rows[0].remaining_count | int) > 0 }}'
        - step: validate_all_results
          when: '{{ (output.data.rows[0].remaining_count | int) == 0 }}'
    set:
      ctx.remaining_count: '{{ output.data.rows[0].remaining_count }}'

  # ------------------------------------------------------------------
  # FINAL VALIDATION
  # ------------------------------------------------------------------
  - step: validate_all_results
    desc: Query final validation log and assert all facilities have 1000/1000 patients
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        SELECT
          facility_mapping_id,
          assessments_done,
          conditions_done,
          medications_done,
          vital_signs_done,
          demographics_done,
          assessments_queue_done,
          total_expected,
          (assessments_done = total_expected
           AND conditions_done = total_expected
           AND medications_done = total_expected
           AND vital_signs_done = total_expected
           AND demographics_done = total_expected) AS all_passed
        FROM public.pft_test_validation_log
        WHERE execution_id = '{{ execution_id }}'
        ORDER BY facility_mapping_id;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: check_results
    set:
      ctx.final_validation_rows: '{{ output.data.rows | default([]) }}'

  - step: check_results
    desc: |
      Assert all 10 facilities have 1000/1000 patients with ACTUAL data in result tables.
      If the v2.14.7 loop.done race bug is present, assessments_queue_done may be 1000
      but assessments_done will be << 1000 (only ~1 batch worth, due to premature cutoff).
    tool:
      kind: python
      input:
        results: '{{ ctx.final_validation_rows | default([]) }}'
        expected_facilities: 10
        expected_patients: 1000
      code: |
        rows = results if isinstance(results, list) else []
        expected_f = int(expected_facilities or 10)
        expected_p = int(expected_patients or 1000)

        print(f"[CHECK] {len(rows)} facilities in validation log (expected {expected_f})")

        failures = []

        if len(rows) != expected_f:
            failures.append(
                f"Expected {expected_f} facilities in log, got {len(rows)} — "
                "execution may have stalled due to loop.done race"
            )

        for r in rows:
            fid = r.get("facility_mapping_id")
            queue_done = int(r.get("assessments_queue_done") or 0)
            for dtype in ["assessments_done", "conditions_done", "medications_done",
                          "vital_signs_done", "demographics_done"]:
                count = int(r.get(dtype) or 0)
                if count != expected_p:
                    note = ""
                    if dtype == "assessments_done" and queue_done > count:
                        note = f" [RACE BUG: {queue_done} queue-done but only {count} fetched]"
                    failures.append(
                        f"facility={fid} {dtype}={count} (expected {expected_p}){note}"
                    )

        assert not failures, (
            f"Patient loss detected in {len(failures)} case(s):\n" + "\n".join(failures)
        )

        result = {
            "status": "passed",
            "facilities_checked": len(rows),
            "patients_per_facility": expected_p,
            "all_data_types_complete": True,
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end
    set:
      ctx.final_check_summary: '{{ output.data }}'

  - step: end
    desc: PFT flow test complete — all facilities and patients processed
    tool:
      kind: python
      input:
        summary: '{{ ctx.final_check_summary }}'
      code: |
        result = {
            "status": "completed",
            "summary": summary,
        }
