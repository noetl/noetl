apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: state_report_synthetic_load
  path: load_test/state_report_synthetic_load
  description: |
    Synthetic load test for a state-report generation workflow.
    Uses synthetic facility and patient data but keeps the production-shaped control flow and wide context characteristics:
      - 21 context steps (~3-8KB each) to simulate fat execution context
      - 540 synthetic patient work items dispatched across chunk workers (serial by default)
      - Each item persists full result_data (source payload + 600 computed fields)
        generated in SQL within chunk worker batch upserts
      - Per-batch distributed parallel processing exercises: NATS dispatch, claim protocol,
        adaptive concurrency controller, event pipeline, and DB pool under controlled contention
      - No sensitive data, no external HTTP calls
    What this test validates:
      - Concurrent worker claims at scale
      - Adaptive concurrency controller ramp-up and stabilization under load
      - Server DB pool handling parallel event ingestion from multiple workers
      - Postgres pool pressure remains within deployed limits
      - No data loss: all synthetic patient work items processed correctly under concurrent load

workload:
  pg_auth: pg_k8s
  total_items: 540
  batch_size: 30
  drop_tables: false
  # Run only one batch at a time by default. This worker processes a full batch in a
  # single SQL upsert, so items_max_in_flight is retained only as a compatibility knob.
  # NOTE: items_max_in_flight does not currently enforce per-item throttling for this batch-upsert worker.
  concurrent_batches: 1
  items_max_in_flight: 1
  chunk_worker_path: load_test/state_report_synthetic_load/state_report_synthetic_load_worker

workflow:
  - step: start
    desc: Initialize synthetic state-report load test
    tool:
      kind: python
      input:
        total_items: '{{ total_items }}'
        batch_size: '{{ batch_size }}'
      code: |
        def _to_positive_int(value, default):
            try:
                parsed = int(value)
            except (TypeError, ValueError):
                return default
            return parsed if parsed > 0 else default

        result = {
            "status": "started",
            "total_items": _to_positive_int(total_items, 540),
            "batch_size": _to_positive_int(batch_size, 30),
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: guard_active_facilities

  - step: guard_active_facilities
    desc: Simulate active-facility preflight guard
    tool:
      kind: python
      code: |
        result = {
            "rows": [
                {"active_count": 1},
                {"total_count": 1},
            ]
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_next_facility

  - step: load_next_facility
    desc: Simulate facility selection context
    tool:
      kind: python
      code: |
        result = {
            "facility_id": 414,
            "facility_name": "Test Facility Alpha",
            "facility_org_uuid": "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee",
            "facility_mapping_id": 414,
            "customer_code": "test_customer",
            "base_url": "https://test.example.com",
            "rows": [{"facility_id": 414, "name": "Test Facility Alpha", "active": True, "region": "west", "tier": "enterprise", "data": "x" * 1024}],
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: fetch_athena_dataview

  - step: fetch_athena_dataview
    desc: Simulate dataview fetch result
    tool:
      kind: python
      code: |
        result = {
            "status": "ok",
            "rows": [{"patient_id": i, "mrn": f"MRN{i:06d}", "dob": "1950-01-01", "gender": "M", "payer": "Medicare", "data": "y" * 50} for i in range(1, 51)],
            "row_count": 50,
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: fetch_and_extract_patient_ids

  - step: fetch_and_extract_patient_ids
    desc: Simulate patient id extraction result
    tool:
      kind: python
      code: |
        result = {
            "patient_ids": list(range(10001, 10201)),
            "count": 200,
            "facility_mapping_id": 414,
            "extracted_at": "2026-01-01T00:00:00Z",
            "meta": {"source": "synthetic_dataview", "version": "v2", "data": "z" * 512},
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patient_ids_context

  - step: load_patient_ids_context
    desc: Simulate patient id context hydration
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "pcc_patient_id": i + 50000} for i in range(10001, 10201)], "row_count": 200}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patients_for_demographics

  - step: load_patients_for_demographics
    desc: Simulate demographics selection result
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "first_name": f"First{i}", "last_name": f"Last{i}", "address": "123 Test St", "city": "Testville", "state": "CA", "zip": "90210"} for i in range(10001, 10051)], "row_count": 50}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_demographics

  - step: parse_demographics
    desc: Simulate demographics parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 50, "skipped": 0, "status": "ok", "records": [{"patient_id": i, "parsed": True, "canonical": {"name": f"Last{i}, First{i}", "dob": "1950-01-01"}} for i in range(10001, 10051)]}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patients_for_assessments

  - step: load_patients_for_assessments
    desc: Simulate assessments selection result
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "pcc_patient_id": i + 50000, "last_assessment_date": "2025-12-01"} for i in range(10001, 10101)], "row_count": 100}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_assessments

  - step: parse_assessments
    desc: Simulate assessments parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 100, "status": "ok", "assessment_ids": list(range(20001, 20101))}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patients_for_medications

  - step: load_patients_for_medications
    desc: Simulate medications selection result
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "medication_count": 5} for i in range(10001, 10101)], "row_count": 100}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_medications

  - step: parse_medications
    desc: Simulate medications parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 100, "medications": [{"patient_id": i, "drug": f"Drug_{i}", "dose": "10mg", "route": "oral", "frequency": "daily", "ndc": f"{i:011d}", "data": "m" * 30} for i in range(10001, 10101)]}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patients_for_conditions

  - step: load_patients_for_conditions
    desc: Simulate conditions selection result
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "condition_count": 3} for i in range(10001, 10101)], "row_count": 100}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_conditions

  - step: parse_conditions
    desc: Simulate conditions parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 100, "conditions": [{"patient_id": i, "icd10": f"Z{i % 99:02d}.{i % 9}", "description": f"Condition {i}", "onset": "2020-01-01"} for i in range(10001, 10101)]}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: load_patients_for_adt

  - step: load_patients_for_adt
    desc: Simulate ADT selection result
    tool:
      kind: python
      code: |
        result = {"rows": [{"patient_id": i, "admit_date": "2025-11-01", "discharge_date": "2025-11-10"} for i in range(10001, 10051)], "row_count": 50}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_adt_records

  - step: parse_adt_records
    desc: Simulate ADT parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 50, "admissions": [{"patient_id": i, "los": 9, "drg": f"DRG{i % 999:03d}", "payer": "Medicare"} for i in range(10001, 10051)]}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: parse_athena_dataview

  - step: parse_athena_dataview
    desc: Simulate dataview parsing result
    tool:
      kind: python
      code: |
        result = {"parsed": 200, "status": "ok", "dataview": [{"patient_id": i, "synthetic_source_id": f"SRC{i}", "insurance": "Medicare Part A", "provider": f"Provider {i % 10}", "data": "a" * 64} for i in range(10001, 10201)]}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: extract_assessment_ids

  - step: extract_assessment_ids
    desc: Simulate assessment id extraction result
    tool:
      kind: python
      code: |
        result = {"assessment_ids": list(range(30001, 30541)), "count": 540, "facility_mapping_id": 414}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: patients_needing_assessments

  - step: patients_needing_assessments
    desc: Simulate patients needing assessments
    tool:
      kind: python
      code: |
        result = {"patient_ids": list(range(10001, 10101)), "count": 100, "reason": "no_recent_assessment"}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: patients_needing_medications

  - step: patients_needing_medications
    desc: Simulate patients needing medications
    tool:
      kind: python
      code: |
        result = {"patient_ids": list(range(10001, 10101)), "count": 100, "reason": "medication_refresh"}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: patients_needing_demographics

  - step: patients_needing_demographics
    desc: Simulate patients needing demographics
    tool:
      kind: python
      code: |
        result = {"patient_ids": list(range(10001, 10101)), "count": 100, "reason": "demographics_refresh"}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: patients_needing_conditions

  - step: patients_needing_conditions
    desc: Simulate patients needing conditions
    tool:
      kind: python
      code: |
        result = {"patient_ids": list(range(10001, 10051)), "count": 50, "reason": "conditions_refresh"}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: patients_needing_adt

  - step: patients_needing_adt
    desc: Simulate patients needing ADT
    tool:
      kind: python
      code: |
        result = {"patient_ids": list(range(10001, 10051)), "count": 50, "reason": "adt_refresh"}
    next:
      spec: { mode: exclusive }
      arcs:
        - step: setup_test_data

  - step: setup_test_data
    desc: Create synthetic per-patient work items for load testing
    tool:
      kind: postgres
      auth: '{{ pg_auth }}'
      command: |
        CREATE TABLE IF NOT EXISTS public.synthetic_state_report_load_items (
          item_id INTEGER PRIMARY KEY,
          group_id INTEGER NOT NULL,
          payload TEXT NOT NULL,
          created_at TIMESTAMPTZ DEFAULT NOW()
        );
        CREATE TABLE IF NOT EXISTS public.synthetic_state_report_load_results (
          item_id INTEGER PRIMARY KEY,
          result_data JSONB NOT NULL,
          processed_at TIMESTAMPTZ DEFAULT NOW()
        );
        DELETE FROM public.synthetic_state_report_load_results;
        DELETE FROM public.synthetic_state_report_load_items;
        INSERT INTO public.synthetic_state_report_load_items (item_id, group_id, payload)
        SELECT
          i AS item_id,
          ((i - 1) / {{ start.batch_size | int }}) + 1 AS group_id,
          'synthetic_payload_' || i || '_' || repeat('x', 64) AS payload
        FROM generate_series(1, {{ start.total_items | int }}) AS i;
      spec:
        policy:
          rules:
            - when: "{{ output.status == 'error' }}"
              then: { do: retry, attempts: 5, backoff: exponential, delay: 2.0 }
            - else:
                then: { do: break }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: build_batch_plan

  - step: build_batch_plan
    desc: Compute batch windows for synthetic patient work
    tool:
      kind: python
      input:
        total_items: '{{ total_items }}'
        batch_size: '{{ batch_size }}'
      code: |
        def _to_positive_int(value, default):
            try:
                parsed = int(value)
            except (TypeError, ValueError):
                return default
            return parsed if parsed > 0 else default

        total = _to_positive_int(total_items, 540)
        size = _to_positive_int(batch_size, 30)
        batches = []
        for idx in range(0, total, size):
            batch_number = (idx // size) + 1
            limit = min(size, total - idx)
            batches.append({
                "batch_number": batch_number,
                "offset": idx,
                "limit": limit,
            })
        result = {
            "batches": batches,
            "batch_count": len(batches),
            "batch_size": size,
            "total_items": total,
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: run_batch_workers

  - step: run_batch_workers
    desc: Dispatch synthetic batch workers across patient work windows
    loop:
      in: '{{ build_batch_plan.batches }}'
      iterator: batch
      spec:
        mode: parallel
        max_in_flight: '{{ (concurrent_batches | default(1) | int) or 1 }}'
        policy:
          exec: distributed
    tool:
      kind: playbook
      path: '{{ chunk_worker_path }}'
      return_step: end
      timeout: 900
      input:
        pg_auth: '{{ pg_auth }}'
        parent_execution_id: '{{ job.execution_id }}'
        batch_number: '{{ iter.batch.batch_number }}'
        offset: '{{ iter.batch.offset }}'
        batch_size: '{{ iter.batch.limit }}'
        items_max_in_flight: '{{ items_max_in_flight }}'
    next:
      spec: { mode: exclusive }
      arcs:
        - step: verify_completion_counts
          when: '{{ event.name == ''loop.done'' }}'

  - step: verify_completion_counts
    desc: Verify all synthetic patient work items were processed
    tool:
      kind: postgres
      auth: '{{ pg_auth }}'
      query: |
        SELECT
          (SELECT COUNT(*) FROM public.synthetic_state_report_load_items) AS total_items,
          (SELECT COUNT(*) FROM public.synthetic_state_report_load_results) AS processed_items,
          (
            SELECT COUNT(*)
            FROM public.synthetic_state_report_load_items s
            WHERE NOT EXISTS (
              SELECT 1
              FROM public.synthetic_state_report_load_results r
              WHERE r.item_id = s.item_id
            )
          ) AS remaining_items;
    next:
      spec: { mode: exclusive }
      arcs:
        - step: summarize

  - step: summarize
    desc: Return synthetic load summary with throughput metrics
    tool:
      kind: python
      input:
        verify_result: '{{ verify_completion_counts }}'
        batch_plan: '{{ build_batch_plan }}'
        worker_loop: '{{ run_batch_workers | default({}) }}'
        concurrent_batches: '{{ concurrent_batches }}'
        items_max_in_flight: '{{ items_max_in_flight }}'
      code: |
        rows = verify_result.get("command_0", {}).get("rows", []) if isinstance(verify_result, dict) else []
        row = rows[0] if rows else {}
        total_items = int(row.get("total_items", 0) or 0)
        processed_items = int(row.get("processed_items", 0) or 0)
        remaining_items = int(row.get("remaining_items", 0) or 0)

        plan = batch_plan if isinstance(batch_plan, dict) else {}
        loop_stats = worker_loop.get("stats", {}) if isinstance(worker_loop, dict) else {}

        result = {
            "status": "completed" if remaining_items == 0 and processed_items == total_items else "failed",
            "total_items": total_items,
            "processed_items": processed_items,
            "remaining_items": remaining_items,
            "is_complete": remaining_items == 0 and processed_items == total_items,
            "batch_plan": {
                "batch_count": int(plan.get("batch_count", 0) or 0),
                "batch_size": int(plan.get("batch_size", 0) or 0),
                "concurrent_batches": int(concurrent_batches or 1),
                "items_max_in_flight": int(items_max_in_flight or 1),
            },
            "worker_loop": {
                "total": int(loop_stats.get("total", 0) or 0),
                "failed": int(loop_stats.get("failed", 0) or 0),
            },
        }
    next:
      spec: { mode: exclusive }
      arcs:
        - step: fail_incomplete
          when: '{{ not (summarize.is_complete | default(false)) }}'
        - step: cleanup
          when: '{{ summarize.is_complete and (drop_tables | string | lower) == "true" }}'
        - step: end
          when: '{{ summarize.is_complete }}'

  - step: fail_incomplete
    desc: Fail when verification finds missing or mismatched synthetic results
    tool:
      kind: python
      input:
        summary: '{{ summarize }}'
      code: |
        raise RuntimeError(f"synthetic state-report load did not reconcile: {summary}")

  - step: cleanup
    desc: Drop test tables
    tool:
      kind: postgres
      auth: '{{ pg_auth }}'
      command: |
        DROP TABLE IF EXISTS public.synthetic_state_report_load_results;
        DROP TABLE IF EXISTS public.synthetic_state_report_load_items;
    next:
      spec: { mode: exclusive }
      arcs:
        - step: end

  - step: end
    desc: End
    tool:
      kind: python
      code: |
        result = {"status": "done"}
