name: forbid-client-term

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  forbid-client-term:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate added lines do not contain blocked client term
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [[ "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-parse "${HEAD_SHA}^")"
            fi
          fi

          echo "Checking added lines from ${BASE_SHA}..${HEAD_SHA}"

          export BASE_SHA HEAD_SHA
          python3 - <<'PY'
          import base64
          import os
          import re
          import subprocess
          import sys

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]

          diff = subprocess.run(
              ["git", "diff", "--unified=0", "--no-color", base, head],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.splitlines()

          # Decodes to a blocked 3-letter client code (kept out of plain text in repo content).
          blocked = base64.b64decode("Ymhz").decode("ascii")
          pattern = re.compile(rf"\b{re.escape(blocked)}\b", re.IGNORECASE)

          violations = []
          for line in diff:
              if not line.startswith("+") or line.startswith("+++"):
                  continue
              if pattern.search(line):
                  violations.append(line)

          if violations:
              print("ERROR: blocked client term found in added lines.")
              for item in violations:
                  print(item)
              sys.exit(1)

          print("OK: no blocked client term found in added lines.")
          PY
